# .github/workflows/aft-ci-gate.yml
name: AFT Quality Gate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  aft-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AFT
        run: pip install aft

      - name: Run CI Gate
        run: aft ci-check --pr ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
